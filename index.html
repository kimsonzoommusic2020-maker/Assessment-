<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Level 1: Gold Edition</title>
    <script src="https://unpkg.com/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://unpkg.com/tone"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }
        #staff-container { background: white; padding: 15px; border-radius: 20px; margin-top: 15px; box-shadow: 0 0 40px rgba(241, 196, 15, 0.3); width: 95%; max-width: 850px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        #status { font-size: 1.4rem; color: #f1c40f; margin-top: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); text-align: center; }
        .row-div { min-height: 130px; width: 100%; display: flex; justify-content: center; }
        #victory-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; color: #f1c40f; padding: 40px 50px; border-radius: 30px; border: 6px solid #f1c40f; text-align: center; z-index: 1000; box-shadow: 0 0 100px #f1c40f; width: 80%; max-width: 400px; box-sizing: border-box; }
        #piano-board { position: relative; display: inline-flex; background: #1a1a1a; padding: 20px 10px; border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 3px 0 #333; margin-top: 20px; border-top: 4px solid #555; overflow-x: auto; max-width: 100%; touch-action: manipulation; }
        .white-key { width: 45px; height: 170px; background: linear-gradient(to bottom, #fff 0%, #ebebeb 85%, #f5f5f5 100%); border: 1px solid #bbb; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; cursor: pointer; z-index: 1; flex-shrink: 0; }
        .black-key { width: 26px; height: 105px; background: linear-gradient(to bottom, #111 0%, #333 100%); border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; cursor: pointer; position: absolute; z-index: 2; flex-shrink: 0; }
    </style>
</head>
<body>

    <div style="margin-top: 20px;">
        <select id="song-select" onchange="loadSong(this.value)" style="padding: 10px; font-size: 1.2rem; border-radius: 10px; cursor: pointer;">
            <option value="Ode to Joy">Ode to Joy</option>
            <option value="Happy Birthday">Happy Birthday</option>
            <option value="Oh When the Saints">Oh When the Saints</option>
        </select>
    </div>

    <div id="status">Line 1 of 3</div>

    <div id="victory-screen">
        <h1 style="font-size: 3rem; margin: 0;">YOU DID IT !</h1>
        <button onclick="location.reload()" style="background: #f1c40f; color: black; margin-top: 20px; border-radius: 50px; padding: 12px 30px; font-weight: bold; border: none; cursor: pointer; font-size: 1rem;">PLAY AGAIN</button>
    </div>

    <div id="staff-container">
        <div id="active-line" class="row-div"></div>
    </div>

    <div id="piano-board">
        <div class="white-key" onclick="handleVirtualKeyPress(60)"></div>
        <div class="black-key" onclick="handleVirtualKeyPress(61)" style="left: 43px;"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(62)"></div>
        <div class="black-key" onclick="handleVirtualKeyPress(63)" style="left: 90px;"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(64)"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(65)"></div>
        <div class="black-key" onclick="handleVirtualKeyPress(66)" style="left: 182px;"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(67)"></div>
        <div class="black-key" onclick="handleVirtualKeyPress(68)" style="left: 229px;"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(69)"></div>
        <div class="black-key" onclick="handleVirtualKeyPress(70)" style="left: 276px;"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(71)"></div>
        <div class="white-key" onclick="handleVirtualKeyPress(72)"></div>
    </div>

    <script>
        const songs = {
            "Ode to Joy": [
                { key: "e/4", midi: 64 }, { key: "e/4", midi: 64 }, { key: "f/4", midi: 65 }, { key: "g/4", midi: 67 },
                { key: "g/4", midi: 67 }, { key: "f/4", midi: 65 }, { key: "e/4", midi: 64 }, { key: "d/4", midi: 62 },
                { key: "c/4", midi: 60 }, { key: "c/4", midi: 60 }, { key: "d/4", midi: 62 }, { key: "e/4", midi: 64 },
                { key: "e/4", midi: 64 }, { key: "d/4", midi: 62 }, { key: "d/4", midi: 62 }
            ],
            "Happy Birthday": [
                { key: "c/4", midi: 60 }, { key: "c/4", midi: 60 }, { key: "d/4", midi: 62 }, { key: "c/4", midi: 60 }, { key: "f/4", midi: 65 }, { key: "e/4", midi: 64 },
                { key: "c/4", midi: 60 }, { key: "c/4", midi: 60 }, { key: "d/4", midi: 62 }, { key: "c/4", midi: 60 }, { key: "g/4", midi: 67 }, { key: "f/4", midi: 65 },
                { key: "c/4", midi: 60 }, { key: "c/4", midi: 60 }, { key: "c/5", midi: 72 }, { key: "a/4", midi: 69 }, { key: "f/4", midi: 65 }, { key: "e/4", midi: 64 }, { key: "d/4", midi: 62 },
                { key: "a#4", midi: 70 }, { key: "a#4", midi: 70 }, { key: "a/4", midi: 69 }, { key: "f/4", midi: 65 }, { key: "g/4", midi: 67 }, { key: "f/4", midi: 65 }
            ],
            "Oh When the Saints": [
                { key: "c/4", midi: 60 }, { key: "e/4", midi: 64 }, { key: "f/4", midi: 65 }, { key: "g/4", midi: 67 },
                { key: "c/4", midi: 60 }, { key: "e/4", midi: 64 }, { key: "f/4", midi: 65 }, { key: "g/4", midi: 67 },
                { key: "c/4", midi: 60 }, { key: "e/4", midi: 64 }, { key: "f/4", midi: 65 }, { key: "g/4", midi: 67 },
                { key: "e/4", midi: 64 }, { key: "c/4", midi: 60 }, { key: "e/4", midi: 64 }, { key: "d/4", midi: 62 },
                { key: "e/4", midi: 64 }, { key: "e/4", midi: 64 }, { key: "d/4", midi: 62 }, { key: "c/4", midi: 60 },
                { key: "e/4", midi: 64 }, { key: "g/4", midi: 67 }, { key: "g/4", midi: 67 }, { key: "f/4", midi: 65 }
            ]
        };

        let currentSongName = "Ode to Joy";
        let melody = songs[currentSongName];
        let currentIndex = 0;
        let lastMatchTime = 0;
        const notesPerLine = 14;

        const synth = new Tone.Sampler({
            urls: { A4: "A4.mp3", C4: "C4.mp3", C5: "C5.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/"
        }).toDestination();

        function loadSong(name) {
            currentSongName = name;
            melody = songs[name];
            currentIndex = 0;
            document.getElementById('victory-screen').style.display = 'none';
            drawAll();
        }

        function drawRow(id, notes, offset) {
            const div = document.getElementById(id);
            div.innerHTML = "";
            const VF = Vex.Flow;
            const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);
            renderer.resize(800, 130);
            const context = renderer.getContext();
            const stave = new VF.Stave(5, 5, 750).addClef("treble").setContext(context).draw();
            const vexNotes = notes.map((m, i) => {
                const note = new VF.StaveNote({ keys: [m.key], duration: "q" });
                let col = (offset + i < currentIndex) ? "#2ecc71" : (offset + i === currentIndex ? "#ff0000" : "black");
                note.setStyle({ fillStyle: col, strokeStyle: col });
                return note;
            });
            const voice = new VF.Voice({ num_beats: notes.length, beat_value: 4 });
            voice.addTickables(vexNotes);
            new VF.Formatter().joinVoices([voice]).format([voice], 700);
            voice.draw(context, stave);
        }

        function drawAll() {
            const startIdx = Math.floor(currentIndex / notesPerLine) * notesPerLine;
            const endIdx = Math.min(startIdx + notesPerLine, melody.length);
            drawRow("active-line", melody.slice(startIdx, endIdx), startIdx);
            document.getElementById('status').innerText = `${currentSongName}: ${Math.floor(currentIndex/notesPerLine)+1} / ${Math.ceil(melody.length/notesPerLine)}`;
        }

        function handleVirtualKeyPress(midi) {
            if (Tone.context.state !== 'running') Tone.start();
            synth.triggerAttackRelease(Tone.Frequency(midi, "midi").toNote(), "8n");
            if (Date.now() - lastMatchTime > 300 && midi === melody[currentIndex].midi) {
                currentIndex++;
                lastMatchTime = Date.now();
                if (currentIndex >= melody.length) {
                    document.getElementById('victory-screen').style.display = 'block';
                    document.getElementById('status').innerText = "🏆 COMPLETE 🏆";
                } else drawAll();
            }
        }

        window.onload = drawAll;
    </script>
</body>
</html>
